services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: surveillance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in your .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/surveillance
      ALLOWED_ORIGINS: '["http://localhost:5173"]'
    depends_on:
      - db
    devices:
      - /dev/video0:/dev/video0
    ports:
      - '8000:8000'

  frontend:
    build: ./frontend
    environment:
      VITE_BACKEND_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  postgres_data:
